<html><body style="background:#1a1a2e;color:#fff;font-family:monospace;padding:20px">
<h2>Bridge Detail</h2>
<pre id="d" style="color:#0f0"></pre>
<script>
var d=document.getElementById('d');
function log(m){d.textContent+=m+'\n';}

function dumpBridge(name, obj) {
  log('=== ' + name + ' ===');
  if(!obj) { log('  undefined'); return; }
  
  // 所有属性 (包括非函数)
  var props = Object.getOwnPropertyNames(obj);
  log('  Properties (' + props.length + '):');
  props.forEach(function(p) {
    try {
      var val = obj[p];
      var t = typeof val;
      var s = '  ' + p + ': ' + t;
      if(t === 'string') s += ' = "' + val.substring(0,80) + '"';
      else if(t === 'number') s += ' = ' + val;
      else if(t === 'function') s += ' (args: ' + val.length + ')';
      else if(t === 'object' && val) {
        try { s += ' keys: ' + Object.keys(val).join(','); } catch(e){}
      }
      log(s);
    } catch(e) {
      log('  ' + p + ': [error: ' + e.message + ']');
    }
  });
  
  // 原型链
  log('  Proto:');
  try {
    var proto = Object.getPrototypeOf(obj);
    if(proto) {
      var protoProps = Object.getOwnPropertyNames(proto);
      protoProps.forEach(function(p) {
        if(p !== 'constructor') {
          try {
            var v = proto[p];
            log('    proto.' + p + ': ' + typeof v);
          } catch(e) {}
        }
      });
    }
  } catch(e) {}
}

dumpBridge('_solana_', window._solana_);
dumpBridge('okxInternalJSBridge', window.okxInternalJSBridge);
dumpBridge('okxBtcJSBridge', window.okxBtcJSBridge);
dumpBridge('_aptos_', window._aptos_);
</script></body></html>
